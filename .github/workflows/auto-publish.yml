name: Publication automatique d'articles

# Lance chaque jour 9h UTC.
# Si une pubDate du calendrier = aujourd'hui et l'article existe en draft,
# retire le flag draft + pousse directement vers main.
on:
  schedule:
    - cron: '0 9 * * *'  # 9h UTC = 10h/11h FR (selon heure d'été)
  workflow_dispatch:  # bouton "Run" manuel dans GitHub

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Chercher & publier article du jour
        run: node scripts/auto-publish.mjs

      - name: Push vers main si changement
        run: |
          if git diff --exit-code --quiet src/content/veille/; then
            echo "Aucun article à publier aujourd'hui."
          else
            DATE=$(date +%Y-%m-%d)
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/content/veille/*.md
            git commit -m "auto: publication article du $DATE (retire draft: true)"
            git push
            echo "✅ Article publié en direct vers main."
          fi
