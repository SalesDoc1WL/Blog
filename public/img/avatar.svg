<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="Willie Leroux — avatar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00543F"/>
      <stop offset="1" stop-color="#006E52"/>
    </linearGradient>
    <linearGradient id="lis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00C896"/>
      <stop offset="0.5" stop-color="#00C896"/>
      <stop offset="0.5" stop-color="#bfe0d5"/>
      <stop offset="1" stop-color="#bfe0d5"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- Motif « flux documentaire » : lignes fines évoquant des documents -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.07">
    <line x1="70" y1="150" x2="530" y2="150"/>
    <line x1="70" y1="185" x2="470" y2="185"/>
    <line x1="70" y1="220" x2="510" y2="220"/>
    <line x1="70" y1="610" x2="530" y2="610"/>
    <line x1="70" y1="645" x2="450" y2="645"/>
    <line x1="70" y1="680" x2="500" y2="680"/>
  </g>
  <!-- Grille discrète -->
  <g stroke="#00C896" stroke-width="1" opacity="0.10">
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
  </g>

  <!-- Liseré de marque (vert électrique / vert clair) -->
  <rect x="70" y="300" width="10" height="200" fill="url(#lis)"/>

  <!-- Monogramme -->
  <text x="300" y="430" text-anchor="middle" font-family="Marianne, Arial, Helvetica, sans-serif"
        font-weight="700" font-size="240" letter-spacing="-8" fill="#ffffff">WL</text>

  <!-- Accent électrique sous le monogramme -->
  <rect x="240" y="470" width="120" height="6" fill="#00C896"/>

  <!-- Légende -->
  <text x="300" y="540" text-anchor="middle" font-family="Marianne, Arial, Helvetica, sans-serif"
        font-weight="500" font-size="26" letter-spacing="6" fill="#bfe0d5">WILLIE LEROUX</text>
  <text x="300" y="575" text-anchor="middle" font-family="Marianne, Arial, Helvetica, sans-serif"
        font-weight="400" font-size="18" letter-spacing="3" fill="#9fd0c0">FLUX DOCUMENTAIRES</text>
</svg>
