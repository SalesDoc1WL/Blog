<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#grad6)"/>

  <!-- 5 Error circles -->
  <g>
    <!-- Error 1 -->
    <circle cx="150" cy="250" r="50" fill="white" opacity="0.9"/>
    <text x="150" y="270" font-size="32" fill="#ef4444" text-anchor="middle" font-weight="bold">1</text>

    <!-- Error 2 -->
    <circle cx="350" cy="150" r="50" fill="white" opacity="0.9"/>
    <text x="350" y="170" font-size="32" fill="#ef4444" text-anchor="middle" font-weight="bold">2</text>

    <!-- Error 3 -->
    <circle cx="600" cy="200" r="50" fill="white" opacity="0.9"/>
    <text x="600" y="220" font-size="32" fill="#ef4444" text-anchor="middle" font-weight="bold">3</text>

    <!-- Error 4 -->
    <circle cx="850" cy="150" r="50" fill="white" opacity="0.9"/>
    <text x="850" y="170" font-size="32" fill="#ef4444" text-anchor="middle" font-weight="bold">4</text>

    <!-- Error 5 -->
    <circle cx="1050" cy="250" r="50" fill="white" opacity="0.9"/>
    <text x="1050" y="270" font-size="32" fill="#ef4444" text-anchor="middle" font-weight="bold">5</text>

    <!-- X marks -->
    <line x1="130" y1="270" x2="170" y2="230" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="170" y1="270" x2="130" y2="230" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>

    <line x1="330" y1="170" x2="370" y2="130" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="370" y1="170" x2="330" y2="130" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>

    <line x1="580" y1="220" x2="620" y2="180" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="620" y1="220" x2="580" y2="180" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>

    <line x1="830" y1="170" x2="870" y2="130" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="870" y1="170" x2="830" y2="130" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>

    <line x1="1030" y1="270" x2="1070" y2="230" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="1070" y1="270" x2="1030" y2="230" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>

    <!-- Recovery message -->
    <text x="600" y="520" font-size="36" fill="white" text-anchor="middle" font-weight="bold">J+5 récupérable</text>
    <text x="600" y="570" font-size="20" fill="white" text-anchor="middle" opacity="0.9">Logs + traces = audit trail</text>
  </g>
</svg>